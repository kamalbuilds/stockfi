[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_remappings = false

[rpc_endpoints]
robinhood_testnet = "${ROBINHOOD_RPC}"
arbitrum_sepolia = "${ARB_SEPOLIA_RPC}"

[etherscan]
robinhood_testnet = { key = "any", url = "https://explorer.testnet.chain.robinhood.com/api/" }
